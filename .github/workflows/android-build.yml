name: Android Build (Release APK/AAB)

# 로컬 개발환경 없이 GitHub Actions ubuntu 러너로 안드로이드 release 빌드를 만든다.
# - 트리거: 수동 실행(workflow_dispatch) 또는 android-v* 태그 푸시 (예: android-v1.0.0)
# - 서명: GitHub Secrets의 keystore(base64)로 서명 → 서명된 APK/AAB 아티팩트 업로드
# - 필요한 Secrets: ANDROID_KEYSTORE_BASE64 · ANDROID_KEYSTORE_PASSWORD
#                  · ANDROID_KEY_ALIAS · ANDROID_KEY_PASSWORD
#                  (+ 기존 VITE_GOOGLE_CLIENT_ID · VITE_KAKAO_MAP_KEY)
on:
  workflow_dispatch:
  push:
    tags:
      - "android-v*"

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: actions/setup-node@v4
        with:
          node-version: 22   # Capacitor CLI 8.x가 Node >=22 요구
      - name: Install deps & build web (android mode)
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_KAKAO_MAP_KEY: ${{ secrets.VITE_KAKAO_MAP_KEY }}
        run: |
          npm ci
          npm run build:android
      - name: Capacitor sync
        run: npx cap sync android
      - name: Decode keystore from Secrets
        # 붙여넣기 과정에서 섞일 수 있는 공백/줄바꿈을 제거한 뒤 디코딩한다.
        # 크기/해시를 출력해 Secret 값 손상 여부를 로그에서 바로 확인할 수 있게 한다.
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_B64" | tr -d '[:space:]' | base64 -d > android/app/release.keystore
          echo "decoded size: $(stat -c%s android/app/release.keystore) bytes (기대값: 2690)"
          echo "sha256: $(sha256sum android/app/release.keystore | cut -d' ' -f1)"
          echo "(기대값: 04e4fb94a421099a9cfc37e8d8b60135954356f61bb3df519fdd9e46f1fd6a32)"
      - name: Gradle build (signed release APK + AAB)
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/frontend/android/app/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        working-directory: frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease
      - name: Upload APK artifact (직접 설치용)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: frontend/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
      - name: Upload AAB artifact (Play Store 업로드용)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: frontend/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
