name: iOS Build (Simulator)

# 팀에 맥이 없어 GitHub Actions macOS 러너로 iOS 빌드를 검증한다.
# - 시뮬레이터용 무서명 빌드(CODE_SIGNING_ALLOWED=NO)까지가 계정 없이 가능한 범위
# - 실기기 설치/TestFlight는 Apple Developer Program 계정 + 서명 인증서 확보 후 단계
# - macOS 러너는 분 차감 10배라 수동 실행(workflow_dispatch) 위주로 사용
on:
  workflow_dispatch:
  push:
    branches: [dev]
    paths:
      - "frontend/ios/**"
      - ".github/workflows/ios-build.yml"

jobs:
  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22   # Capacitor CLI 8.x가 Node >=22 요구
      - name: Install deps & build web
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_KAKAO_MAP_KEY: ${{ secrets.VITE_KAKAO_MAP_KEY }}
        run: |
          npm ci
          npm run build
      - name: Capacitor sync
        run: npx cap sync ios
      - name: Xcode build (simulator, unsigned)
        run: |
          xcodebuild -project ios/App/App.xcodeproj -scheme App \
            -sdk iphonesimulator -configuration Debug \
            -derivedDataPath build CODE_SIGNING_ALLOWED=NO build
      - name: Upload simulator app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: frontend/build/Build/Products/Debug-iphonesimulator/App.app
          if-no-files-found: error
