<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="withdraw">
  <defs>
    <linearGradient id="bg_withdraw" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff8a8a"/><stop offset="1" stop-color="#e84d4d"/>
    </linearGradient>
    <linearGradient id="gloss_withdraw" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="ds_withdraw" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect x="8" y="8" width="104" height="104" rx="30" fill="url(#bg_withdraw)" filter="url(#ds_withdraw)"/>
  <rect x="8" y="8" width="104" height="60" rx="30" fill="url(#gloss_withdraw)"/>
  <g transform="translate(60,60)">
  <!-- 머리 (중앙) -->
  <circle cx="0" cy="-12" r="12" fill="#ffffff"/>
  <!-- 몸통 (좌우 대칭, 중앙) -->
  <path d="M-20,22 a20,16 0 0 1 40,0 z" fill="#ffffff"/>
  <!-- X 배지 (오른쪽 위에 겹침) -->
  <circle cx="17" cy="11" r="11" fill="#ffffff" stroke="#ffd9d9" stroke-width="1"/>
  <g stroke="#e84d4d" stroke-width="3.4" stroke-linecap="round">
    <line x1="12" y1="6" x2="22" y2="16"/><line x1="22" y1="6" x2="12" y2="16"/>
  </g>
</g>
</svg>