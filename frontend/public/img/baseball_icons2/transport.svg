<svg viewBox="8 8 104 104" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="transport">
  <defs>
    <linearGradient id="bg_transport" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5fd0ff"/>
      <stop offset="1" stop-color="#2596d8"/>
    </linearGradient>
    <linearGradient id="gloss_transport" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="ds_transport" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <!-- 배경 카드 -->
  <rect x="8" y="8" width="104" height="104" rx="26" fill="url(#bg_transport)" filter="url(#ds_transport)"/>
  <!-- 상단 광택 -->
  <rect x="8" y="8" width="104" height="60" rx="26" fill="url(#gloss_transport)"/>
  <!-- 심볼 -->
  <g transform="translate(60,60)">

  <!-- 버스 차체(측면) : 앞쪽(오른쪽)이 둥근 형태 -->
  <path d="M-32,-22 h50 a14,14 0 0 1 14,14 v18 a6,6 0 0 1 -6,6 h-58 a6,6 0 0 1 -6,-6 v-26 a6,6 0 0 1 6,-6 z" fill="#ffffff"/>
  <!-- 지붕 노란 스트라이프 -->
  <path d="M-32,-22 h50 a14,14 0 0 1 13,9 l-69,0 v-3 a6,6 0 0 1 6,-6 z" fill="#ffd24d"/>
  <!-- 행선지 표시판 -->
  <rect x="-26" y="-19.5" width="16" height="5" rx="2.5" fill="#3a4a5a"/>
  <!-- 승객 창문 2개 -->
  <rect x="-28" y="-9" width="15" height="13" rx="3.5" fill="#9bd6f5"/>
  <rect x="-9" y="-9" width="15" height="13" rx="3.5" fill="#9bd6f5"/>
  <!-- 앞유리(운전석) -->
  <path d="M10,-9 h8 a10,10 0 0 1 10,9 v4 h-18 z" fill="#9bd6f5"/>
  <!-- 창문 하이라이트 -->
  <path d="M-26,-7 l5,0 l-7,9 l0,-5 z" fill="#ffffff" opacity="0.6"/>
  <path d="M-7,-7 l5,0 l-7,9 l0,-5 z" fill="#ffffff" opacity="0.6"/>
  <!-- 출입문 -->
  <rect x="10" y="-9" width="0" height="0" fill="none"/>
  <!-- 하단 스커트 라인 -->
  <rect x="-32" y="9" width="64" height="4" fill="#e8f4fb"/>
  <!-- 헤드라이트(앞) / 테일라이트(뒤) -->
  <circle cx="28" cy="11" r="3" fill="#ffe27a"/>
  <rect x="-32" y="6" width="3.5" height="6" rx="1.5" fill="#ff6b6b"/>
  <!-- 바퀴 2개 + 휠하우스 -->
  <path d="M-26,16 a9,9 0 0 1 18,0 z" fill="#cfe7f5"/>
  <path d="M8,16 a9,9 0 0 1 18,0 z" fill="#cfe7f5"/>
  <g>
    <circle cx="-17" cy="17" r="7" fill="#3a4a5a"/>
    <circle cx="-17" cy="17" r="3" fill="#ffffff"/>
    <circle cx="17" cy="17" r="7" fill="#3a4a5a"/>
    <circle cx="17" cy="17" r="3" fill="#ffffff"/>
  </g>
  <!-- 사이드 미러 -->
  <line x1="30" y1="-12" x2="33" y2="-15" stroke="#3a4a5a" stroke-width="2" stroke-linecap="round"/>
  <circle cx="33.5" cy="-16" r="2.2" fill="#3a4a5a"/>

  </g>
</svg>
