<svg viewBox="8 8 104 104" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="tour">
  <defs>
    <linearGradient id="bg_tour" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff9db6"/>
      <stop offset="1" stop-color="#ec5f88"/>
    </linearGradient>
    <linearGradient id="gloss_tour" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="ds_tour" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <!-- 배경 카드 -->
  <rect x="8" y="8" width="104" height="104" rx="26" fill="url(#bg_tour)" filter="url(#ds_tour)"/>
  <!-- 상단 광택 -->
  <rect x="8" y="8" width="104" height="60" rx="26" fill="url(#gloss_tour)"/>
  <!-- 심볼 -->
  <g transform="translate(60,60)">

  <!-- 카메라 상단 돌출부 -->
  <rect x="-12" y="-24" width="24" height="12" rx="4" fill="#ffffff"/>
  <!-- 카메라 본체 -->
  <rect x="-30" y="-16" width="60" height="40" rx="9" fill="#ffffff"/>
  <!-- 본체 포인트 라인 -->
  <rect x="-30" y="-16" width="60" height="9" rx="4.5" fill="#ffd24d"/>
  <!-- 렌즈 -->
  <circle cx="0" cy="4" r="14" fill="#f9b8cb"/>
  <circle cx="0" cy="4" r="10" fill="#7ec3ef"/>
  <circle cx="0" cy="4" r="10" fill="none" stroke="#ffffff" stroke-width="2"/>
  <!-- 렌즈 하이라이트 -->
  <circle cx="-3.5" cy="0.5" r="3" fill="#ffffff" opacity="0.85"/>
  <!-- 플래시 -->
  <circle cx="21" cy="-7" r="3" fill="#ffe27a"/>
  <!-- 셔터 버튼 -->
  <rect x="-26" y="-22" width="9" height="6" rx="2.5" fill="#ec5f88"/>
  <!-- 반짝임 포인트 -->
  <path d="M24,14 l1.6,3.4 l3.4,1.6 l-3.4,1.6 l-1.6,3.4 l-1.6,-3.4 l-3.4,-1.6 l3.4,-1.6 z" fill="#ffd24d"/>

  </g>
</svg>
