<svg viewBox="8 8 104 104" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="area">
  <defs>
    <linearGradient id="bg_area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7fe08f"/>
      <stop offset="1" stop-color="#3cb35a"/>
    </linearGradient>
    <linearGradient id="gloss_area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="ds_area" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <!-- 배경 카드 -->
  <rect x="8" y="8" width="104" height="104" rx="26" fill="url(#bg_area)" filter="url(#ds_area)"/>
  <!-- 상단 광택 -->
  <rect x="8" y="8" width="104" height="60" rx="26" fill="url(#gloss_area)"/>
  <!-- 심볼 -->
  <g transform="translate(60,60)">

  <!-- 뒷 건물(왼쪽, 낮음) -->
  <rect x="-30" y="-8" width="22" height="38" rx="4" fill="#d9f5de"/>
  <g fill="#3cb35a" opacity="0.55">
    <rect x="-26" y="-3" width="6" height="6" rx="1.5"/>
    <rect x="-16" y="-3" width="6" height="6" rx="1.5"/>
    <rect x="-26" y="8" width="6" height="6" rx="1.5"/>
    <rect x="-16" y="8" width="6" height="6" rx="1.5"/>
  </g>
  <!-- 앞 건물(오른쪽, 높음) -->
  <rect x="-4" y="-26" width="32" height="56" rx="5" fill="#ffffff"/>
  <!-- 지붕 포인트 -->
  <rect x="-4" y="-26" width="32" height="8" rx="4" fill="#ffd24d"/>
  <!-- 창문 -->
  <g fill="#7ec3ef">
    <rect x="1" y="-13" width="7" height="7" rx="2"/>
    <rect x="14" y="-13" width="7" height="7" rx="2"/>
    <rect x="1" y="-1" width="7" height="7" rx="2"/>
    <rect x="14" y="-1" width="7" height="7" rx="2"/>
  </g>
  <!-- 출입문 -->
  <rect x="7" y="14" width="10" height="16" rx="3" fill="#3cb35a"/>
  <!-- 위치 핀 -->
  <g transform="translate(-22,-22)">
    <path d="M0,-10 a10,10 0 1,1 -0.01,0 M0,12 l-7,-9 a10,10 0 0,0 14,0 z" fill="#ff6b81"/>
    <circle cx="0" cy="-1" r="9" fill="#ff6b81"/>
    <path d="M0,14 l-7,-10 l14,0 z" fill="#ff6b81"/>
    <circle cx="0" cy="-1" r="4" fill="#ffffff"/>
  </g>

  </g>
</svg>
