<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="mood">
  <defs>
    <linearGradient id="bg_mood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe066"/>
      <stop offset="1" stop-color="#ffc107"/>
    </linearGradient>
    <linearGradient id="gloss_mood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="ds_mood" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <!-- 배경 카드 -->
  <rect x="8" y="8" width="104" height="104" rx="26" fill="url(#bg_mood)" filter="url(#ds_mood)"/>
  <!-- 상단 광택 -->
  <rect x="8" y="8" width="104" height="60" rx="26" fill="url(#gloss_mood)"/>
  <!-- 심볼 -->
  <g transform="translate(60,60)">
    
  <circle cx="0" cy="0" r="28" fill="#ffffff"/>
  <circle cx="-10" cy="-6" r="3.6" fill="#444"/>
  <circle cx="10" cy="-6" r="3.6" fill="#444"/>
  <path d="M-12,8 q12,12 24,0" stroke="#444" stroke-width="3.4" fill="none" stroke-linecap="round"/>

  </g>
</svg>