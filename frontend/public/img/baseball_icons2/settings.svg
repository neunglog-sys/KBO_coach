<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="settings">
  <defs>
    <linearGradient id="bg_settings" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b0bcc9"/>
      <stop offset="1" stop-color="#7a8896"/>
    </linearGradient>
    <linearGradient id="gloss_settings" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="ds_settings" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <!-- 배경 카드 -->
  <rect x="8" y="8" width="104" height="104" rx="26" fill="url(#bg_settings)" filter="url(#ds_settings)"/>
  <!-- 상단 광택 -->
  <rect x="8" y="8" width="104" height="60" rx="26" fill="url(#gloss_settings)"/>
  <!-- 심볼 -->
  <g transform="translate(60,60)">
    
  <g fill="#ffffff">
    <circle cx="0" cy="0" r="22"/>
  </g>
  <g fill="#7a8896">
    <circle cx="0" cy="0" r="9"/>
  </g>
  <g stroke="#ffffff" stroke-width="6" stroke-linecap="round">
    <line x1="0" y1="-28" x2="0" y2="-20"/>
    <line x1="0" y1="28" x2="0" y2="20"/>
    <line x1="-28" y1="0" x2="-20" y2="0"/>
    <line x1="28" y1="0" x2="20" y2="0"/>
    <line x1="-20" y1="-20" x2="-14" y2="-14"/>
    <line x1="20" y1="20" x2="14" y2="14"/>
    <line x1="-20" y1="20" x2="-14" y2="14"/>
    <line x1="20" y1="-20" x2="14" y2="-14"/>
  </g>

  </g>
</svg>