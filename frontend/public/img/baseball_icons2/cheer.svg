<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="cheer">
  <defs>
    <linearGradient id="bg_cheer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffb24d"/>
      <stop offset="1" stop-color="#f5862a"/>
    </linearGradient>
    <linearGradient id="gloss_cheer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="ds_cheer" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <!-- 배경 카드 -->
  <rect x="8" y="8" width="104" height="104" rx="26" fill="url(#bg_cheer)" filter="url(#ds_cheer)"/>
  <!-- 상단 광택 -->
  <rect x="8" y="8" width="104" height="60" rx="26" fill="url(#gloss_cheer)"/>
  <!-- 심볼 -->
  <g transform="translate(60,60)">
    
  <!-- 메가폰 나팔(원근감) -->
  <path d="M-26,-13 L4,-20 L4,20 L-26,13 Z" fill="#ffffff"/>
  <ellipse cx="4" cy="0" rx="6" ry="20" fill="#ffe7cc"/>
  <ellipse cx="-26" cy="0" rx="3.5" ry="13" fill="#ffd0a0"/>
  <!-- 입구 테 -->
  <path d="M4,-20 q7,2 7,20 q0,18 -7,20" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <!-- 손잡이 -->
  <path d="M-12,14 l-4,9 a4,4 0 0 0 6,2 l3,-7" fill="#ffffff"/>
  <!-- 소리선 -->
  <g stroke="#ffffff" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M16,-12 q7,12 0,24"/>
    <path d="M24,-18 q12,18 0,36"/>
  </g>

  </g>
</svg>