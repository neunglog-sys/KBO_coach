<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="stadium">
  <defs>
    <linearGradient id="bg_stadium" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9b8cff"/>
      <stop offset="1" stop-color="#6c5ce7"/>
    </linearGradient>
    <linearGradient id="gloss_stadium" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="ds_stadium" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <!-- 배경 카드 -->
  <rect x="8" y="8" width="104" height="104" rx="26" fill="url(#bg_stadium)" filter="url(#ds_stadium)"/>
  <!-- 상단 광택 -->
  <rect x="8" y="8" width="104" height="60" rx="26" fill="url(#gloss_stadium)"/>
  <!-- 심볼 -->
  <g transform="translate(60,60)">
    
  <!-- 관중석(바깥 둥근 테두리) -->
  <ellipse cx="0" cy="2" rx="32" ry="28" fill="#ffffff"/>
  <ellipse cx="0" cy="2" rx="26" ry="22" fill="#c9bef5"/>
  <!-- 잔디 필드 -->
  <ellipse cx="0" cy="4" rx="24" ry="19" fill="#7ee07a"/>
  <ellipse cx="0" cy="4" rx="24" ry="19" fill="none" stroke="#5cc95a" stroke-width="1" stroke-dasharray="3 3"/>
  <!-- 내야 흙(다이아몬드) -->
  <path d="M0,-7 l17,12 l-17,12 l-17,-12 z" fill="#d8a368"/>
  <!-- 베이스 4개 -->
  <g fill="#ffffff">
    <rect x="-2.5" y="-9" width="5" height="5" rx="1" transform="rotate(45 0 -6.5)"/>
    <rect x="13" y="2.5" width="5" height="5" rx="1" transform="rotate(45 15.5 5)"/>
    <rect x="-2.5" y="13" width="5" height="5" rx="1" transform="rotate(45 0 15.5)"/>
    <rect x="-18" y="2.5" width="5" height="5" rx="1" transform="rotate(45 -15.5 5)"/>
  </g>
  <!-- 마운드 -->
  <circle cx="0" cy="4" r="3" fill="#c98f55"/>
  <!-- 조명탑 2개(위쪽) -->
  <g fill="#ffe27a"><rect x="-30" y="-26" width="8" height="5" rx="1.5"/><rect x="22" y="-26" width="8" height="5" rx="1.5"/></g>
  <g stroke="#ffffff" stroke-width="2"><line x1="-26" y1="-21" x2="-26" y2="-14"/><line x1="26" y1="-21" x2="26" y2="-14"/></g>

  </g>
</svg>