<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="volume">
  <defs>
    <linearGradient id="bg_volume" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff7eb3"/>
      <stop offset="1" stop-color="#e84d8a"/>
    </linearGradient>
    <linearGradient id="gloss_volume" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="ds_volume" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <!-- 배경 카드 -->
  <rect x="8" y="8" width="104" height="104" rx="26" fill="url(#bg_volume)" filter="url(#ds_volume)"/>
  <!-- 상단 광택 -->
  <rect x="8" y="8" width="104" height="60" rx="26" fill="url(#gloss_volume)"/>
  <!-- 심볼 -->
  <g transform="translate(60,60)">
    
  <!-- 왼쪽 야광봉(살짝 기울임) -->
  <g transform="rotate(-18)">
    <rect x="-22" y="-26" width="11" height="34" rx="5.5" fill="#ffffff"/>
    <rect x="-19.5" y="-23" width="6" height="20" rx="3" fill="#7ee0ff"/>
    <rect x="-22" y="6" width="11" height="9" rx="3" fill="#f2c0d6"/>
  </g>
  <!-- 오른쪽 야광봉(반대로 기울임) -->
  <g transform="rotate(18)">
    <rect x="11" y="-26" width="11" height="34" rx="5.5" fill="#ffffff"/>
    <rect x="13.5" y="-23" width="6" height="20" rx="3" fill="#ffe27a"/>
    <rect x="11" y="6" width="11" height="9" rx="3" fill="#f2c0d6"/>
  </g>
  <!-- 흔드는 모션선 -->
  <g stroke="#fff" stroke-width="2.6" stroke-linecap="round" opacity="0.9">
    <path d="M-26,-24 q-5,3 -4,9"/>
    <path d="M26,-24 q5,3 4,9"/>
  </g>

  </g>
</svg>