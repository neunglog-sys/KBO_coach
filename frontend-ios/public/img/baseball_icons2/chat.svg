<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="chat">
  <defs>
    <linearGradient id="bg_chat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5aa9ff"/>
      <stop offset="1" stop-color="#2f7be0"/>
    </linearGradient>
    <linearGradient id="gloss_chat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="ds_chat" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <!-- 배경 카드 -->
  <rect x="8" y="8" width="104" height="104" rx="26" fill="url(#bg_chat)" filter="url(#ds_chat)"/>
  <!-- 상단 광택 -->
  <rect x="8" y="8" width="104" height="60" rx="26" fill="url(#gloss_chat)"/>
  <!-- 심볼 -->
  <g transform="translate(60,60)">
    
  <!-- 받은 말풍선 (왼쪽 위, 흰색) : x -30~22 → 중심 -4 -->
  <g transform="translate(-6,-14)">
    <rect x="-30" y="-12" width="52" height="26" rx="13" fill="#ffffff"/>
    <path d="M-20,12 l-8,10 l1,-13 z" fill="#ffffff"/>
    <g fill="#9cc3ef"><circle cx="-16" cy="1" r="3.4"/><circle cx="-4" cy="1" r="3.4"/><circle cx="8" cy="1" r="3.4"/></g>
  </g>
  <!-- 보낸 말풍선 (오른쪽 아래, 노란색) : x -22~30 → 중심 4 -->
  <g transform="translate(6,16)">
    <rect x="-22" y="-12" width="52" height="26" rx="13" fill="#ffe27a"/>
    <path d="M20,12 l8,10 l-1,-13 z" fill="#ffe27a"/>
    <g fill="#e0a93a"><circle cx="-8" cy="1" r="3.4"/><circle cx="4" cy="1" r="3.4"/><circle cx="16" cy="1" r="3.4"/></g>
  </g>

  </g>
</svg>