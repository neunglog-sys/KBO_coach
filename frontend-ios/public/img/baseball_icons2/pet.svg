<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="pet">
  <defs>
    <linearGradient id="bg_pet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7ee07a"/>
      <stop offset="1" stop-color="#3cb371"/>
    </linearGradient>
    <linearGradient id="gloss_pet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="ds_pet" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <!-- 배경 카드 -->
  <rect x="8" y="8" width="104" height="104" rx="26" fill="url(#bg_pet)" filter="url(#ds_pet)"/>
  <!-- 상단 광택 -->
  <rect x="8" y="8" width="104" height="60" rx="26" fill="url(#gloss_pet)"/>
  <!-- 심볼 -->
  <g transform="translate(60,60)">
    
  <!-- 야구공 얼굴 -->
  <circle cx="0" cy="2" r="29" fill="#ffffff"/>
  <!-- 옆 실밥 살짝 -->
  <g stroke="#f0a070" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.8">
    <path d="M-24,-8 q-4,10 0,20"/>
    <path d="M24,-8 q4,10 0,20"/>
  </g>
  <!-- 볼 터치 -->
  <circle cx="-15" cy="8" r="5" fill="#ffc2c2"/>
  <circle cx="15" cy="8" r="5" fill="#ffc2c2"/>
  <!-- 큰 눈 + 하이라이트 -->
  <circle cx="-10" cy="-1" r="5.5" fill="#3a3a3a"/>
  <circle cx="10" cy="-1" r="5.5" fill="#3a3a3a"/>
  <circle cx="-8" cy="-3" r="1.8" fill="#fff"/>
  <circle cx="12" cy="-3" r="1.8" fill="#fff"/>
  <!-- 방긋 입 -->
  <path d="M-7,11 q7,7 14,0" stroke="#3a3a3a" stroke-width="2.6" fill="none" stroke-linecap="round"/>
  <!-- 머리 위 반짝임 -->
  <path d="M0,-32 l1.6,3.4 l3.6,0.4 l-2.6,2.6 l0.7,3.6 l-3.3,-1.8 l-3.3,1.8 l0.7,-3.6 l-2.6,-2.6 l3.6,-0.4 z" fill="#ffe27a"/>

  </g>
</svg>