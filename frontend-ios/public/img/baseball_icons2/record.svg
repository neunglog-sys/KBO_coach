<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="record">
  <defs>
    <linearGradient id="bg_record" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd24d"/>
      <stop offset="1" stop-color="#f5a623"/>
    </linearGradient>
    <linearGradient id="gloss_record" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="ds_record" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <!-- 배경 카드 -->
  <rect x="8" y="8" width="104" height="104" rx="26" fill="url(#bg_record)" filter="url(#ds_record)"/>
  <!-- 상단 광택 -->
  <rect x="8" y="8" width="104" height="60" rx="26" fill="url(#gloss_record)"/>
  <!-- 심볼 -->
  <g transform="translate(60,60)">
    
  <!-- 노트 본체(가운데) -->
  <rect x="-22" y="-30" width="44" height="60" rx="6" fill="#ffffff"/>
  <!-- 왼쪽 제본 -->
  <rect x="-22" y="-30" width="9" height="60" rx="4" fill="#e07b2a"/>
  <!-- 링 -->
  <g fill="#ffffff"><circle cx="-17.5" cy="-20" r="2.2"/><circle cx="-17.5" cy="0" r="2.2"/><circle cx="-17.5" cy="20" r="2.2"/></g>
  <!-- 줄 -->
  <g stroke="#f5a623" stroke-width="3.4" stroke-linecap="round">
    <line x1="-6" y1="-14" x2="14" y2="-14"/>
    <line x1="-6" y1="-2" x2="14" y2="-2"/>
    <line x1="-6" y1="10" x2="8" y2="10"/>
  </g>
  <!-- 연필 포인트 -->
  <path d="M12,16 l8,-8 l4,4 l-8,8 l-5,1 z" fill="#e07b2a"/>

  </g>
</svg>