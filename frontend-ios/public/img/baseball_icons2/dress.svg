<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="dress">
  <defs>
    <linearGradient id="bg_dress" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c79bff"/>
      <stop offset="1" stop-color="#9b59e6"/>
    </linearGradient>
    <linearGradient id="gloss_dress" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="ds_dress" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <!-- 배경 카드 -->
  <rect x="8" y="8" width="104" height="104" rx="26" fill="url(#bg_dress)" filter="url(#ds_dress)"/>
  <!-- 상단 광택 -->
  <rect x="8" y="8" width="104" height="60" rx="26" fill="url(#gloss_dress)"/>
  <!-- 심볼 -->
  <g transform="translate(60,60)">
    
  <!-- 유니폼 상의(등판) -->
  <path d="M-13,-22 l-15,9 l7,13 l7,-4 v26 a4,4 0 0 0 4,4 h20 a4,4 0 0 0 4,-4 v-26 l7,4 l7,-13 l-15,-9 l-6,4 q-7,5 -14,0 z" fill="#ffffff"/>
  <!-- 핀스트라이프 -->
  <g stroke="#9b59e6" stroke-opacity="0.14" stroke-width="1.4">
    <line x1="-13" y1="-4" x2="-13" y2="22"/>
    <line x1="-6.5" y1="-6" x2="-6.5" y2="22"/>
    <line x1="0" y1="-7" x2="0" y2="22"/>
    <line x1="6.5" y1="-6" x2="6.5" y2="22"/>
    <line x1="13" y1="-4" x2="13" y2="22"/>
  </g>
  <!-- 뒷목 카라 -->
  <path d="M-7,-18 q7,5 14,0" fill="none" stroke="#9b59e6" stroke-width="2.4" stroke-linecap="round"/>
  <!-- 이니셜(어깨 위쪽) -->
  <text x="0" y="-6" font-family="Arial Black, Arial" font-size="8.5" font-weight="900" fill="#9b59e6" text-anchor="middle" letter-spacing="0.5">BC</text>
  <!-- 큰 등번호 -->
  <text x="0" y="17" font-family="Arial Black, Arial" font-size="22" font-weight="900" fill="#9b59e6" text-anchor="middle">7</text>

  </g>
</svg>